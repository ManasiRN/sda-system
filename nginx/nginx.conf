worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Never expose nginx version in headers or error pages
    server_tokens off;

    # Sliding-window rate-limit zone: 10 MB stores ~160 000 IP entries
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=200r/m;
    limit_req_status 429;

    # Upstream — keepalive reuses connections to the FastAPI process pool
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # Port 80 — HTTP  →  HTTPS redirect + standalone health probe
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Nginx liveness probe (used by docker-compose healthcheck)
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Everything else gets a permanent redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # Port 443 — HTTPS  →  proxy to FastAPI
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name _;

        # TLS — replace with CA-signed certs in production
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Modern TLS: only 1.2 + 1.3, strong cipher suite
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # Session resumption — reduces TLS handshake latency for repeat clients
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                       always;
        add_header X-Frame-Options           "DENY"                                          always;
        add_header X-XSS-Protection          "1; mode=block"                                 always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

        # Compress JSON responses (saves ~70 % bandwidth on pass lists)
        gzip on;
        gzip_types application/json text/plain;
        gzip_min_length 256;

        # ── Public API  ──────────────────────────────────────────────────────
        location / {
            # Burst=50: absorbs short spikes; nodelay: don't queue, reject immediately
            limit_req zone=api_zone burst=50 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ── Admin endpoints — restricted to RFC-1918 private ranges ──────────
        # Operators access /admin/* via VPN or bastion host.
        # X-Admin-Key authentication is enforced by FastAPI in addition to this.
        location /admin/ {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny  all;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
